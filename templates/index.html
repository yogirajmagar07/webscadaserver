<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flow Meter Dashboard</title>

<style>

body{
    font-family: Arial;
    background:#e9e9e9;
    margin:0;
}

.header{
    background:black;
    color:white;
    padding:15px;
    font-size:20px;
    overflow: auto;
}

.container{
    display:grid;
    grid-template-columns: repeat(3, minmax(320px, 1fr)); /* Fixed to 3 columns */
    gap:20px;
    padding:20px;
}

.card{
    background:#234461;
    border-radius:10px;
    padding:15px;
    color:white;
}

.card h3{
    margin-top:0;
    border-bottom:1px solid rgba(255,255,255,0.2);
    padding-bottom:6px;
}

/* Row layout */
.row{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
    margin-top:10px;
}

.label{
    font-size:12px;
    opacity:0.8;
}

.valueBox{
    background:black;
    border-radius:6px;
    padding:12px;
    text-align:center;
    font-size:18px;
    margin-top:3px;
}

.block{
    display:flex;
    flex-direction:column;
}

/* Highlight for bunker card */
.bunker-card {
    border: 2px solid #ffd700;
    background: #2c5282;
}

.bunker-card h3 {
    color: #ffd700;
}

/* Responsive for smaller screens */
@media screen and (max-width: 1100px){
    .container{
        grid-template-columns: repeat(2, 1fr); /* 2 columns on medium screens */
    }
}

@media screen and (max-width: 700px){
    .container{
        grid-template-columns: 1fr; /* 1 column on mobile */
    }
}

</style>
</head>

<body>

<div class="header">

    <span style="font-weight:bold">MP AHTS-1 Flow Meter Dashboard</span>

    <div style="float:right">

        <a href="/" style="color:white;margin-right:15px;">Dashboard</a>
        <a href="/reports" style="color:white;margin-right:15px;">Reports</a>

        <a href="/logout">
            <button style="background:#e74c3c;color:white;border:none;padding:6px 12px;border-radius:5px;cursor:pointer;">
                Logout
            </button>
        </a>

    </div>

</div>

<!-- Add last update element -->
<div style="padding: 0 20px;">
    <div style="background: #fff; padding: 10px; border-radius: 5px; margin-top: 10px;">
        <strong>Last Updated:</strong> <span id="lastUpdate">--</span>
    </div>
</div>

<div class="container" id="dashboard"></div>

<script>

// Panel mapping - SME together and BUNKER at the end
const panels = [
    {title:"PME INLET", prefix:"FT1"},
    {title:"PME OUTLET", prefix:"FT2"},
    {title:"SME INLET", prefix:"FT3"},
    {title:"SME OUTLET", prefix:"FT4"},
    {title:"PAE INLET", prefix:"FT5"},
    {title:"PAE OUTLET", prefix:"FT6"},
    {title:"SAE INLET", prefix:"FT7"},
    {title:"SAE OUTLET", prefix:"FT8"},
    {title:"BUNKER FLOW", prefix:"FT9"}  // Bunker flow at the end
];

// Row structure
const row1 = [
    {label:"Mass Flow (T/H)", tag:"MassFlow"},
    {label:"Volume Flow (L/H)", tag:"VolumeFlow"},
    {label:"Density (kg/m³)", tag:"Density"}
];

const row2 = [
    {label:"Total Flow (T)", tag:"Masstotal"},
    {label:"Total Flow (L)", tag:"Volumetotal"},
    {label:"Temperature (°C)", tag:"Temp"}
];

// Build dashboard
function buildDashboard(){

    let container = document.getElementById("dashboard");

    panels.forEach(panel => {

        let card = document.createElement("div");
        card.className = "card";
        
        // Add special class for bunker card
        if (panel.prefix === "FT9") {
            card.classList.add("bunker-card");
        }

        card.innerHTML += `<h3>${panel.title}</h3>`;

        // Row 1
        card.innerHTML += buildRow(panel.prefix, row1);

        // Row 2
        card.innerHTML += buildRow(panel.prefix, row2);

        container.appendChild(card);
    });
}

// Helper to build rows
function buildRow(prefix, fields){

    let html = `<div class="row">`;

    fields.forEach(f => {

        let id = prefix + f.tag;

        html += `
            <div class="block">
                <div class="label">${f.label}</div>
                <div class="valueBox" id="${id}">0</div>
            </div>
        `;
    });

    html += `</div>`;
    return html;
}

buildDashboard();

// Function to round to 5 decimal places
function roundTo5Decimals(value) {
    if (value === null || value === undefined || value === '') return '0';
    const num = parseFloat(value);
    if (isNaN(num)) return '0';
    return num.toFixed(5);
}

// Load data from cache
async function loadData(){

    try{
        // Add cache-busting query parameter
        let res = await fetch("/api/latest?t=" + new Date().getTime());
        let data = await res.json();

        if(data.length === 0) return;

        let latest = data[0];

        panels.forEach(panel => {

            [...row1, ...row2].forEach(f => {

                let tag = panel.prefix + f.tag;
                let el = document.getElementById(tag);

                if(el){
                    // Round the value to 5 decimal places
                    let value = latest[tag] ?? 0;
                    el.innerText = roundTo5Decimals(value);
                }

            });
        });

        // Update last update time
        let lastUpdateEl = document.getElementById("lastUpdate");
        if (lastUpdateEl) {
            lastUpdateEl.innerText = latest.TimestampIST || new Date().toLocaleString();
        }

    }catch(e){
        console.log("Error loading data:", e);
        
        // Update last update time with error indication
        let lastUpdateEl = document.getElementById("lastUpdate");
        if (lastUpdateEl) {
            lastUpdateEl.innerText = "Error loading data - " + new Date().toLocaleString();
        }
    }
}

// Load data immediately and then every 5 seconds
loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
