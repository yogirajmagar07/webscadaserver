<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flow Meter Reports</title>

<style>
body{
    font-family: Arial;
    background:#e9e9e9;
    margin:0;
}

.header{
    background:black;
    color:white;
    padding:15px;
    font-size:20px;
    overflow: auto;
}

.reportBox{
    background:#234461;
    margin:20px;
    padding:20px;
    border-radius:12px;
    color:white;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.filter-section {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
}

.filter-item {
    display: flex;
    flex-direction: column;
}

.filter-item label {
    font-size: 12px;
    opacity: 0.8;
    margin-bottom: 5px;
}

input, select{
    padding:10px;
    border-radius:6px;
    border:none;
    background: white;
    font-size: 14px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size: 14px;
    font-weight: bold;
    margin-right: 10px;
    margin-bottom: 10px;
    transition: opacity 0.3s;
}

button:hover {
    opacity: 0.9;
}

.btn-blue{
    background:#2e86de;
    color:white;
}

.btn-green{
    background:#27ae60;
    color:white;
}

.btn-red{
    background:#e74c3c;
    color:white;
}

.btn-purple{
    background:#9b59b6;
    color:white;
}

.status-message {
    margin: 10px 0;
    padding: 10px;
    border-radius: 4px;
    display: none;
}

.status-success {
    background: #27ae60;
    color: white;
}

.status-error {
    background: #e74c3c;
    color: white;
}

.status-info {
    background: #2e86de;
    color: white;
}

.loading {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid #f3f3f3;
    border-top: 3px solid #3498db;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-right: 10px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Responsive */
@media screen and (max-width: 768px){
    .filter-section {
        grid-template-columns: 1fr;
    }
    
    button {
        width: 100%;
        margin-right: 0;
    }
}
</style>
</head>

<body>

<div class="header">

    <span style="font-weight:bold">MP AHTS-1 Flow Meter Reports</span>

    <div style="float:right">
        <a href="/" style="color:white;margin-right:15px;">Dashboard</a>
        <a href="/reports" style="color:white;margin-right:15px;">Reports</a>
        <a href="/logout">
            <button class="btn-red" style="padding:6px 12px;">Logout</button>
        </a>
    </div>

</div>

<div class="reportBox">

    <h3>📊 Generate Flow Meter Report</h3>
    
    <div class="status-message" id="statusMessage"></div>

    <div class="filter-section">
        <div class="filter-item">
            <label>📅 From Time</label>
            <input type="datetime-local" id="fromTime" step="1" required>
        </div>

        <div class="filter-item">
            <label>📅 To Time</label>
            <input type="datetime-local" id="toTime" step="1" required>
        </div>
        
        <div class="filter-item">
            <label>⚙️ Select Engine/Generator</label>
            <select id="engineGroup" onchange="updateGroupInfo()">
                <option value="PME">PME - Main Engine (P) </option>
                <option value="SME">SME - Main Engine (S) </option>
                <option value="PAE">PAE - Auxiliary Engine (P) </option>
                <option value="SAE">SAE - Auxiliary Engine (S) </option>
                <option value="consumpution">TOTAL - Total Consumption </option>
            </select>
        </div>

        <div class="filter-item">
            <label>⏱️ Interval</label>
            <select id="interval" onchange="updateIntervalInfo()">
                <option value="minute">Minute Wise </option>
                <option value="hour" selected>Hour Wise </option>
                <option value="daily">Daily Wise </option>
                <option value="monthly">Monthly Wise </option>
                <option value="yearly">Yearly Wise </option>
            </select>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <button class="btn-green" onclick="downloadCSV()" id="csvBtn">📥 Download CSV</button>
        <button class="btn-purple" onclick="downloadPDF()" id="pdfBtn">📄 Download PDF</button>
        <button class="btn-red" onclick="resetFilters()">🔄 Reset</button>
    </div>

</div>

<script>
function showStatus(message, type) {
    let statusEl = document.getElementById('statusMessage');
    statusEl.style.display = 'block';
    statusEl.className = 'status-message status-' + type;
    statusEl.innerHTML = message;
    
    setTimeout(() => {
        statusEl.style.display = 'none';
    }, 5000);
}

function setLoading(isLoading, buttonId) {
    let btn = document.getElementById(buttonId);
    if (isLoading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span> Processing...';
    } else {
        btn.disabled = false;
        btn.innerHTML = btn.innerHTML.replace('<span class="loading"></span> Processing...', 
            buttonId === 'csvBtn' ? '📥 Download CSV' : '📄 Download PDF');
    }
}

function formatDateTimeForAPI(dateTimeLocal) {
    // Convert from datetime-local to format expected by API (YYYY-MM-DD HH:MM:SS)
    return dateTimeLocal.replace('T', ' ') + ':00';
}

function validateInputs() {
    let fromTime = document.getElementById("fromTime").value;
    let toTime = document.getElementById("toTime").value;

    if(!fromTime || !toTime){
        showStatus("❌ Please select From and To time", "error");
        return false;
    }
    
    // Validate that from time is before to time
    if (new Date(fromTime) >= new Date(toTime)) {
        showStatus("❌ From time must be before To time", "error");
        return false;
    }
    
    return true;
}

function downloadCSV() {
    if (!validateInputs()) return;
    
    let fromTime = document.getElementById("fromTime").value;
    let toTime = document.getElementById("toTime").value;
    let meterType = document.getElementById("meterType").value;
    
    setLoading(true, 'csvBtn');
    
    try {
        let fromFormatted = formatDateTimeForAPI(fromTime);
        let toFormatted = formatDateTimeForAPI(toTime);
        
        // Use the server-side CSV download
        let url = `/download_csv?type=${meterType}&start=${encodeURIComponent(fromFormatted)}&end=${encodeURIComponent(toFormatted)}`;
        
        // Trigger download
        window.location.href = url;
        
        showStatus("📥 CSV download started. Please check your downloads folder.", "success");
    } catch (error) {
        console.error('CSV download error:', error);
        showStatus(`❌ Error downloading CSV: ${error.message}`, "error");
    } finally {
        setTimeout(() => {
            setLoading(false, 'csvBtn');
        }, 2000);
    }
}

function downloadPDF() {
    if (!validateInputs()) return;
    
    let fromTime = document.getElementById("fromTime").value;
    let toTime = document.getElementById("toTime").value;
    let meterType = document.getElementById("meterType").value;
    
    setLoading(true, 'pdfBtn');
    
    try {
        let fromFormatted = formatDateTimeForAPI(fromTime);
        let toFormatted = formatDateTimeForAPI(toTime);
        
        // Use the server-side PDF download
        let url = `/download_pdf?type=${meterType}&start=${encodeURIComponent(fromFormatted)}&end=${encodeURIComponent(toFormatted)}`;
        
        // Trigger download
        window.location.href = url;
        
        showStatus("📄 PDF download started. Please check your downloads folder.", "success");
    } catch (error) {
        console.error('PDF download error:', error);
        showStatus(`❌ Error downloading PDF: ${error.message}`, "error");
    } finally {
        setTimeout(() => {
            setLoading(false, 'pdfBtn');
        }, 2000);
    }
}

function resetFilters() {
    document.getElementById("fromTime").value = '';
    document.getElementById("toTime").value = '';
    document.getElementById("meterType").value = 'FT1';
    document.getElementById("statusMessage").style.display = 'none';
}

// Set default dates (last 24 hours)
function setDefaultDates() {
    let end = new Date();
    let start = new Date(end.getTime() - (24 * 60 * 60 * 1000));
    
    let formatDateTime = (date) => {
        let year = date.getFullYear();
        let month = String(date.getMonth() + 1).padStart(2, '0');
        let day = String(date.getDate()).padStart(2, '0');
        let hours = String(date.getHours()).padStart(2, '0');
        let minutes = String(date.getMinutes()).padStart(2, '0');
        return `${year}-${month}-${day}T${hours}:${minutes}`;
    };
    
    document.getElementById("fromTime").value = formatDateTime(start);
    document.getElementById("toTime").value = formatDateTime(end);
}

// Initialize on page load
setDefaultDates();
</script>

</body>
</html>
